name: Deploy rendered PDFs to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Symlink notatki.cls into all subfolders
        run: |
          ln -sf "$(realpath ./notatki.cls)" "../notatki.cls"
          ln -sf "$(realpath ./konspekt.cls)" "../konspekt.cls"

      - name: Compile all TeX files to PDF (recursive)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: |
            **/*.tex

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload PDFs as artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '**/*.pdf'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
